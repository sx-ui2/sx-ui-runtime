name: Build Caddy naive runtime

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/caddy-naive-sync.yml
      - scripts/build-caddy-naive.sh
      - scripts/patches/forwardproxy-naive-stats.patch
  schedule:
    - cron: "41 */6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: Official Caddy version or tag to build, leave blank for latest
        required: false
        type: string
      force:
        description: Rebuild even if this repository already has the matching release
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: caddy-naive-sync
  cancel-in-progress: false

jobs:
  resolve:
    name: resolve upstream version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      should_build: ${{ steps.existing.outputs.should_build }}
    steps:
      - id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_VERSION}" ]]; then
            RAW_TAG="${INPUT_VERSION}"
          else
            RAW_TAG=""
            auth_args=()
            if [[ -n "${GITHUB_TOKEN:-}" ]]; then
              auth_args=(-H "Authorization: Bearer ${GITHUB_TOKEN}")
            fi
            for attempt in 1 2 3 4 5; do
              if RAW_TAG="$(curl -fsSL "${auth_args[@]}" \
                -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/caddyserver/caddy/releases/latest | jq -r '.tag_name')" \
                && [[ -n "${RAW_TAG}" ]] && [[ "${RAW_TAG}" != "null" ]]; then
                break
              fi
              RAW_TAG=""
              sleep $((attempt * 5))
            done
            if [[ -z "${RAW_TAG}" ]]; then
              echo "failed to resolve latest Caddy release tag" >&2
              exit 1
            fi
          fi

          VERSION="${RAW_TAG#v}"
          TAG="v${VERSION}"
          RELEASE_TAG="caddy-naive-${TAG}"

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
      - id: existing
        env:
          FORCE: ${{ inputs.force }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${FORCE}" == "true" ]]; then
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          STATUS="$(curl -sS -o /tmp/release.json -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"

          if [[ "${STATUS}" == "200" ]]; then
            echo "release ${RELEASE_TAG} already exists, skipping build"
            echo "should_build=false" >> "${GITHUB_OUTPUT}"
          else
            echo "should_build=true" >> "${GITHUB_OUTPUT}"
          fi

  build:
    name: build ${{ matrix.arch }}
    needs: resolve
    if: needs.resolve.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ~1.25.8
          cache: false
      - name: Build runtime
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          ARCH: ${{ matrix.arch }}
          XCADDY_VERSION: v0.4.5
          FORWARDPROXY_COMMIT: d62c80d3dd2c706b6b87579844d2397bddd18317
        run: |
          set -euo pipefail
          chmod +x scripts/build-caddy-naive.sh
          PACKAGE_DIR="dist/caddy-naive-${VERSION}-linux-${ARCH}"
          mkdir -p "${PACKAGE_DIR}"
          for attempt in 1 2 3; do
            if ./scripts/build-caddy-naive.sh "${VERSION}" "${ARCH}" "${PACKAGE_DIR}"; then
              exit 0
            fi
            echo "build attempt ${attempt} failed" >&2
            if [[ "${attempt}" -eq 3 ]]; then
              exit 1
            fi
            rm -rf "${PACKAGE_DIR}"
            mkdir -p "${PACKAGE_DIR}"
            sleep $((attempt * 10))
          done
      - name: Package runtime
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          tar -C dist -czf "caddy-naive-${VERSION}-linux-${ARCH}.tar.gz" "caddy-naive-${VERSION}-linux-${ARCH}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy-naive-${{ needs.resolve.outputs.version }}-${{ matrix.arch }}
          path: caddy-naive-${{ needs.resolve.outputs.version }}-linux-${{ matrix.arch }}.tar.gz

  release:
    name: publish release
    needs:
      - resolve
      - build
    if: needs.resolve.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Record release metadata and push tag
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          TAG: ${{ needs.resolve.outputs.tag }}
          RELEASE_TAG: ${{ needs.resolve.outputs.release_tag }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          mkdir -p releases/caddy-naive
          cat > "releases/caddy-naive/${VERSION}.json" <<EOF
          {
            "runtime": "caddy-naive",
            "version": "${VERSION}",
            "upstream_tag": "${TAG}",
            "release_tag": "${RELEASE_TAG}",
            "run_id": "${RUN_ID}",
            "run_number": "${RUN_NUMBER}",
            "run_attempt": "${RUN_ATTEMPT}",
            "generated_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "releases/caddy-naive/${VERSION}.json"
          git commit -m "build: caddy naive ${TAG}"
          git tag -fa "${RELEASE_TAG}" -m "caddy naive ${TAG}"
          git push origin HEAD:main
          git push origin "refs/tags/${RELEASE_TAG}" --force
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: caddy naive ${{ needs.resolve.outputs.tag }}
          draft: false
          prerelease: false
          body: |
            Auto-built from official Caddy tag `${{ needs.resolve.outputs.tag }}`.

            Build basis:
            - official Caddy source
            - plugin: `github.com/caddyserver/forwardproxy` from `klzgrad/forwardproxy@naive`
            - pinned forwardproxy commit: `d62c80d3dd2c706b6b87579844d2397bddd18317`
            - patch: `scripts/patches/forwardproxy-naive-stats.patch`

            Included assets:
            - `caddy`
            - `build-info.json`
          files: |
            dist/**/*.tar.gz
